version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      # Allow production updates only (can do a AND, several entries are doing a OR)
      - dependency-type: "production"
      #- dependency-type: "direct"
    exclude-paths:
      - 'dev'
      - 'tests/acceptance'
      - 'tests/selenium'
